<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Cinematic AI Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700;800&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#06040e;--surface:#0f0b1e;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--fg:#f0f0f0;--muted:rgba(255,255,255,0.4);--accent:#7c3aed;--accent2:#a855f7;--danger:#ef4444;--success:#22c55e}
  html,body{min-height:100%;background:var(--bg);color:var(--fg);font-family:'DM Sans',sans-serif}
  #login-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;overflow:hidden}#login-bg-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:.45;pointer-events:none}#login-overlay{position:absolute;inset:0;z-index:1;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,.25) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(168,85,247,.15) 0%,transparent 55%),rgba(6,4,14,.7)}.login-box{position:relative;z-index:2;background:rgba(15,11,30,.9);backdrop-filter:blur(24px);border:1px solid var(--border2);border-radius:20px;padding:44px 40px 40px;width:100%;max-width:400px;box-shadow:0 40px 80px rgba(0,0,0,.6)}
  .login-box{background:rgba(15,11,30,.9);backdrop-filter:blur(24px);border:1px solid var(--border2);border-radius:20px;padding:44px 40px 40px;width:100%;max-width:400px;box-shadow:0 40px 80px rgba(0,0,0,.6)}
  .login-logo{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;font-style:italic;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
  .login-logo span{color:var(--accent2)}
  .login-sub{font-size:12px;color:var(--muted);margin-bottom:32px;letter-spacing:.03em}
  .lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;display:block}
  .inp{width:100%;background:rgba(255,255,255,.04);border:1.5px solid var(--border2);border-radius:10px;padding:13px 16px;font-size:14px;color:var(--fg);font-family:'DM Sans',sans-serif;outline:none;margin-bottom:16px;transition:border-color .2s}
  .inp:focus{border-color:var(--accent)}
  .login-btn{width:100%;background:var(--accent);border:none;border-radius:10px;padding:15px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#fff;cursor:pointer;transition:background .2s,box-shadow .3s}
  .login-btn:hover{background:var(--accent2);box-shadow:0 0 20px rgba(168,85,247,.35)}
  .login-btn:disabled{opacity:.5;cursor:not-allowed}
  .login-err{color:var(--danger);font-size:12px;margin-top:10px;display:none}
  #admin-panel{display:none;min-height:100vh}
  .ah{position:sticky;top:0;z-index:50;background:rgba(6,4,14,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between}
  .al{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;font-style:italic;letter-spacing:.06em;text-transform:uppercase}
  .al span{color:var(--accent2)}
  .au{display:flex;align-items:center;gap:12px}
  .aun{font-size:13px;color:var(--muted)}
  .lob{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:6px 14px;font-size:12px;color:#f87171;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
  .lob:hover{background:rgba(239,68,68,.2)}
  .pl{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;transition:color .2s}
  .pl:hover{color:var(--fg)}
  .ab{max-width:900px;margin:0 auto;padding:40px 24px}
  .st{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;margin-top:40px;display:flex;align-items:center;gap:10px}
  .st::after{content:'';flex:1;height:1px;background:var(--border)}
  .st:first-child{margin-top:0}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px}
  label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:8px}
  input[type=text],input[type=url],input[type=password],textarea{width:100%;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:13.5px;color:var(--fg);font-family:'DM Sans',sans-serif;outline:none;margin-bottom:16px;resize:none;transition:border-color .2s}
  input:focus,textarea:focus{border-color:var(--accent)}
  textarea{min-height:80px;resize:vertical}
  .sb{background:var(--accent);border:none;border-radius:10px;padding:11px 28px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#fff;cursor:pointer;transition:background .2s,box-shadow .3s}
  .sb:hover{background:var(--accent2);box-shadow:0 0 16px rgba(168,85,247,.3)}
  .nr{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:start;margin-bottom:8px}
  .nr input{margin-bottom:0}
  .tr{display:grid;grid-template-columns:60px 1fr auto;gap:10px;align-items:start;margin-bottom:8px}
  .tr input{margin-bottom:0}
  .db{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:11px 12px;cursor:pointer;color:#f87171;font-size:14px;transition:all .2s}
  .db:hover{background:rgba(239,68,68,.18)}
  .addb{background:rgba(255,255,255,.04);border:1px dashed var(--border2);border-radius:10px;padding:10px;width:100%;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;font-family:'DM Sans',sans-serif;margin-top:4px;margin-bottom:16px;transition:all .2s}
  .addb:hover{background:rgba(255,255,255,.07);color:var(--fg)}
  .vp{width:100%;border-radius:10px;background:#000;aspect-ratio:16/9;object-fit:cover;margin-bottom:16px;display:block}
  .vr{display:flex;gap:10px;align-items:flex-start}
  .vr input{flex:1;margin-bottom:0}
  .vr button{background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:10px;padding:11px 18px;font-size:13px;color:var(--fg);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .2s}
  .vr button:hover{background:rgba(255,255,255,.1)}
  .pw2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pw2 input{margin-bottom:0}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:28px;right:28px;z-index:9999;background:var(--success);color:#fff;border-radius:12px;padding:14px 22px;font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.4);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.22,1,.36,1);pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.err{background:var(--danger)}
  @media(max-width:600px){.ab{padding:24px 16px}.nr{grid-template-columns:1fr auto}.nr input:nth-child(2){display:none}.pw2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login-screen">
  <video id="login-bg-video" muted autoplay loop playsinline></video>
  <div id="login-overlay"></div>
  <div class="login-box">
    <div class="login-logo">CINEMATIC <span>ADMIN</span></div>
    <div class="login-sub">Painel de administração · Acesso restrito</div>
    <span class="lbl">Usuário</span>
    <input class="inp" type="text" id="lu" placeholder="admin" autocomplete="username">
    <span class="lbl">Senha</span>
    <input class="inp" type="password" id="lp" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="lbtn" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="lerr">Usuário ou senha incorretos.</div>
  </div>
</div>

<div id="admin-panel">
  <div class="ah">
    <div class="al">CINEMATIC <span>ADMIN</span></div>
    <div class="au">
      <a href="/" target="_blank" class="pl">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M5 2H2.5A.5.5 0 002 2.5v9a.5.5 0 00.5.5h9a.5.5 0 00.5-.5V9m-5-4 4-4m0 0h-3m3 0v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Ver site
      </a>
      <span class="aun" id="aun">—</span>
      <button class="lob" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="ab">
    <div class="st">Hero Section</div>
    <div class="card">
      <label>Headline principal (HTML permitido)</label>
      <textarea id="cfg-hl"></textarea>
      <label>Sub-headline (HTML permitido)</label>
      <textarea id="cfg-sub"></textarea>
      <button class="sb" onclick="save('hero')">Salvar Hero</button>
    </div>

    <div class="st">Menu de Navegação</div>
    <div class="card">
      <div id="nav-ed"></div>
      <button class="addb" onclick="addNav()">+ Adicionar item</button>
      <button class="sb" onclick="save('nav')">Salvar Menu</button>
    </div>

    <div class="st">Ticker — Slide Infinito</div>
    <div class="card">
      <div id="tick-ed"></div>
      <button class="addb" onclick="addTick()">+ Adicionar item</button>
      <button class="sb" onclick="save('ticker')">Salvar Ticker</button>
    </div>

    <div class="st">Vídeo de Background — Site</div>
    <div class="card">
      <video class="vp" id="vp" muted autoplay loop playsinline></video>
      <label>URL do vídeo do site (MP4 direto)</label>
      <div class="vr">
        <input type="url" id="cfg-vid" placeholder="https://...mp4">
        <button onclick="prevVid()">Preview</button>
      </div>
      <button class="sb" onclick="save('video')">Salvar Vídeo do Site</button>
    </div>

    <div class="st">Vídeo de Background — Tela de Login</div>
    <div class="card">
      <video class="vp" id="vp-login" muted autoplay loop playsinline></video>
      <label>URL do vídeo da tela de login (MP4 direto)</label>
      <div class="vr">
        <input type="url" id="cfg-vid-login" placeholder="https://...mp4">
        <button onclick="prevVidLogin()">Preview</button>
      </div>
      <button class="sb" onclick="save('videoLogin')">Salvar Vídeo do Login</button>
    </div>

    <div class="st">Segurança</div>
    <div class="card">
      <label>Alterar senha</label>
      <div class="pw2">
        <input type="password" id="pwc" placeholder="Senha atual">
        <input type="password" id="pwn" placeholder="Nova senha (mín. 6)">
      </div>
      <button class="sb" onclick="changePw()">Alterar Senha</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var TK='cinematic_admin_token', token=null, _S=sessionStorage;

async function doLogin(){
  var btn=document.getElementById('lbtn'),err=document.getElementById('lerr');
  var u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value;
  err.style.display='none';
  if(!u||!p)return;
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Entrando...';
  try{
    var r=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    var d=await r.json();
    if(!r.ok)throw new Error(d.error||'Erro');
    token=d.token;_S.setItem(TK,token);showPanel(d.username);
  }catch(e){
    err.textContent=e.message==='Invalid credentials'?'Usuário ou senha incorretos.':e.message;
    err.style.display='block';btn.disabled=false;btn.textContent='Entrar';
  }
}

function doLogout(){
  token=null;_S.removeItem(TK);
  document.getElementById('admin-panel').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('lp').value='';
  document.getElementById('lbtn').disabled=false;document.getElementById('lbtn').textContent='Entrar';
}

async function showPanel(name){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-panel').style.display='block';
  document.getElementById('aun').textContent=name;
  await loadCfg();
}

async function loadCfg(){
  try{
    var r=await fetch('/admin/config',{headers:{'Authorization':'Bearer '+token}});
    if(r.status===401){doLogout();return;}
    var c=await r.json();
    document.getElementById('cfg-hl').value=c.headline||'Cinematic\n<br><span class="gradient-text">AI Studio</span>';
    document.getElementById('cfg-sub').value=c.subheadline||'';
    var vu=c.videoUrl||'';document.getElementById('cfg-vid').value=vu;
    if(vu){var v=document.getElementById('vp');v.src=vu;v.load();}
    var vlu=c.videoLoginUrl||'';document.getElementById('cfg-vid-login').value=vlu;
    if(vlu){var vlv=document.getElementById('vp-login');vlv.src=vlu;vlv.load();
      var lbv=document.getElementById('login-bg-video');lbv.src=vlu;lbv.load();}
    var nl=Array.isArray(c.navLinks)?c.navLinks:[{label:'Sports',url:'sports.html'},{label:'Illusion',url:'illusion.html'},{label:'Mascot',url:'mascot.html'},{label:'Lettering',url:'lettering.html'},{label:'Live Action',url:'liveaction.html'},{label:'Extrator',url:'extraidor.html'}];
    renderNav(nl);
    var ti=Array.isArray(c.tickerItems)?c.tickerItems:[{icon:'A',label:'Anthropic'},{icon:'C',label:'Claude'},{icon:'U',label:'Unreal 5'},{icon:'P',label:'RenderMan'},{icon:'D',label:'DreamWorks'},{icon:'M',label:'MoonRay'},{icon:'S',label:'Stable Diffusion'},{icon:'R',label:'Railway'}];
    renderTick(ti);
  }catch(e){toast('Erro ao carregar: '+e.message,'err');}
}

async function save(sec){
  var p={};
  if(sec==='hero'){p.headline=document.getElementById('cfg-hl').value;p.subheadline=document.getElementById('cfg-sub').value;}
  else if(sec==='nav'){p.navLinks=readNav();}
  else if(sec==='ticker'){p.tickerItems=readTick();}
  else if(sec==='video'){p.videoUrl=document.getElementById('cfg-vid').value.trim();}
  else if(sec==='videoLogin'){p.videoLoginUrl=document.getElementById('cfg-vid-login').value.trim();}
  try{
    var r=await fetch('/admin/config',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(p)});
    if(r.status===401){doLogout();return;}
    var d=await r.json();
    if(!d.ok)throw new Error(d.error||'Erro');
    toast('✓ Salvo! Alterações já estão no ar.');
  }catch(e){toast(e.message,'err');}
}

async function changePw(){
  var cur=document.getElementById('pwc').value,nw=document.getElementById('pwn').value;
  if(!cur||!nw)return toast('Preencha os dois campos.','err');
  if(nw.length<6)return toast('Nova senha precisa ter pelo menos 6 caracteres.','err');
  try{
    var r=await fetch('/admin/change-password',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({currentPassword:cur,newPassword:nw})});
    var d=await r.json();
    if(!r.ok)throw new Error(d.error||'Erro');
    document.getElementById('pwc').value='';document.getElementById('pwn').value='';
    toast('✓ Senha alterada com sucesso!');
  }catch(e){toast(e.message,'err');}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function renderNav(items){
  document.getElementById('nav-ed').innerHTML=items.map(function(x){
    return '<div class="nr"><input type="text" placeholder="Rótulo" value="'+esc(x.label)+'" class="nl"><input type="text" placeholder="URL" value="'+esc(x.url)+'" class="nu"><button class="db" onclick="this.parentElement.remove()">✕</button></div>';
  }).join('');
}
function addNav(){
  var d=document.createElement('div');d.className='nr';
  d.innerHTML='<input type="text" placeholder="Rótulo" class="nl"><input type="text" placeholder="URL" class="nu"><button class="db" onclick="this.parentElement.remove()">✕</button>';
  document.getElementById('nav-ed').appendChild(d);
}
function readNav(){
  return Array.from(document.querySelectorAll('#nav-ed .nr')).map(function(r){
    return{label:r.querySelector('.nl').value.trim(),url:r.querySelector('.nu').value.trim()};
  }).filter(function(x){return x.label;});
}

function renderTick(items){
  document.getElementById('tick-ed').innerHTML=items.map(function(x){
    return '<div class="tr"><input type="text" placeholder="Ícone" value="'+esc(x.icon||'')+'" class="ti" maxlength="4"><input type="text" placeholder="Nome" value="'+esc(x.label)+'" class="tl"><button class="db" onclick="this.parentElement.remove()">✕</button></div>';
  }).join('');
}
function addTick(){
  var d=document.createElement('div');d.className='tr';
  d.innerHTML='<input type="text" placeholder="Ícone" class="ti" maxlength="4"><input type="text" placeholder="Nome" class="tl"><button class="db" onclick="this.parentElement.remove()">✕</button>';
  document.getElementById('tick-ed').appendChild(d);
}
function readTick(){
  return Array.from(document.querySelectorAll('#tick-ed .tr')).map(function(r){
    return{icon:r.querySelector('.ti').value.trim(),label:r.querySelector('.tl').value.trim()};
  }).filter(function(x){return x.label;});
}

function prevVid(){
  var u=document.getElementById('cfg-vid').value.trim();if(!u)return;
  var v=document.getElementById('vp');v.src=u;v.load();v.play().catch(function(){});
}
function prevVidLogin(){
  var u=document.getElementById('cfg-vid-login').value.trim();if(!u)return;
  var v=document.getElementById('vp-login');v.src=u;v.load();v.play().catch(function(){});
  var lbv=document.getElementById('login-bg-video');lbv.src=u;lbv.load();lbv.play().catch(function(){});
}

function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(type?(' '+type):'');
  setTimeout(function(){t.className='toast'+(type?' '+type:'');},100);
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},6000);
}

// Boot: restaurar sessão salva
(async function(){
  var saved=_S.getItem(TK);if(!saved)return;
  try{
    var r=await fetch('/admin/config',{headers:{'Authorization':'Bearer '+saved}});
    if(r.ok){
      token=saved;
      var pl=JSON.parse(atob(saved.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      showPanel(pl.username||'admin');
    }else{_S.removeItem(TK);}
  }catch(e){_S.removeItem(TK);}
})();
</script>
</body>
</html>
